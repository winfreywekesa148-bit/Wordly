<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordly</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="header">WORDLY</header>
    
    <main>

    <div class="searchcontainer">
        <h3>SEARCH</h3>
        <form id="searchform">
            <input type="text" id="input" placeholder="Enter a word (^-^)" aria-label="search" required>

            <div id="button">
                <button type="submit">Search</button>
            </div>
        </form>
    </div>

    <div class="resultcontainer">
        <h3 id="res">RESULTS</h3>
        <div id="results">
            <h3 class="description">DESCRIPTION</h3>
                <div id="description"></div>
                <div id="word"></div>
                <div id="phonetic"></div>
            <audio id="audio" control hidden>AUDIO 🔊</audio>
            <div>
            <h3 class="synonyms">SYNONYMS</h3>
                <div id="synonyms"></div>
            </div>
            <div>
                <h3 class="source">SOURCE</h3>
                <div id="source"></div>
            </div>
            
        </div>
    </div>

    <div id="toast">SEARCHING IN WORDLY</div>

        </main>
    <script src="./scripts.js"></script>

</body>
</html>
